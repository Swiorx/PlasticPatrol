<nav class="navi glass-panel">
    <div class="nav-left">
        @if (auth.currentUser(); as user) {
        <span class="user-greeting">Hi, <b>{{ user.username }}</b>! <span class="points-badge">{{ user.eco_points }} points</span></span>
        }
    </div>

    <ul class="nav-center">
        <li><a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Home</a></li>
        <li><a routerLink="/map" routerLinkActive="active">Map</a></li>
        @if (auth.currentUser()) {
        <li><a routerLink="/profile" routerLinkActive="active">Profile</a></li>
        }
    </ul>

    <div class="nav-right">
        @if (auth.currentUser()) {
        <button type="button" class="btn-glass" (click)="logout()">Logout</button>
        } @else {
        <a routerLink="/login" class="btn-glass">Login</a>
        <a routerLink="/register" class="btn-primary">Register</a>
        }
    </div>
</nav>
