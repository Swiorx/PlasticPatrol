<app-header></app-header>
<div class="auth-page-wrapper">
  <div class="auth-page glass-panel">
    <h1>Welcome Back</h1>
    <p class="subtitle">Log in to track plastic debris</p>
    <form (ngSubmit)="submit()" #f="ngForm">
      <label>
        Username or Email
        <input type="text" name="username" [(ngModel)]="username" required autocomplete="username" placeholder="john_doe" />
      </label>
      <label>
        Password
        <input type="password" name="password" [(ngModel)]="password" required autocomplete="current-password" />
      </label>
      @if (errorMsg) {
        <p class="error">{{ errorMsg }}</p>
      }
      <button type="submit" class="btn-primary" [disabled]="loading || f.invalid">
        {{ loading ? 'Logging in...' : 'Login' }}
      </button>
    </form>
    <p class="switch-auth">No account? <a routerLink="/register">Register here</a></p>
  </div>
</div>
