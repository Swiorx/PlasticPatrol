<app-header></app-header>
<div class="auth-page-wrapper">
  <div class="auth-page glass-panel">
    <h1>Create an Account</h1>
    <p class="subtitle">Join PlasticPatrol today</p>
    <form (ngSubmit)="submit()" #f="ngForm">
      <label>
        Username
        <input type="text" name="username" [(ngModel)]="username" required autocomplete="username" placeholder="john_doe" />
      </label>
      <label>
        Email
        <input type="email" name="email" [(ngModel)]="email" required autocomplete="email" placeholder="john@example.com" />
      </label>
      <label>
        Password
        <input type="password" name="password" [(ngModel)]="password" required autocomplete="new-password" />
      </label>
      <label>
        Confirm Password
        <input type="password" name="confirmPassword" [(ngModel)]="confirmPassword" required autocomplete="new-password" />
      </label>
      @if (errorMsg) {
        <p class="error">{{ errorMsg }}</p>
      }
      <button type="submit" class="btn-primary" [disabled]="loading || f.invalid">
        {{ loading ? 'Registering...' : 'Register' }}
      </button>
    </form>
    <p class="switch-auth">Already have an account? <a routerLink="/login">Log in here</a></p>
  </div>
</div>
