<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">🛰 PLASTICPATROL</div>
    <h2>Welcome back</h2>
    <p class="subtitle">Sign in to track your eco-points</p>

    <form (ngSubmit)="submit()" #f="ngForm">
      <div class="field">
        <label class="label">Email</label>
        <input type="email" [(ngModel)]="email" name="email" placeholder="you@example.com" required>
      </div>
      <div class="field">
        <label class="label">Password</label>
        <input type="password" [(ngModel)]="password" name="password" placeholder="••••••••" required>
      </div>

      @if (error) { <p class="error-msg">{{ error }}</p> }

      <button type="submit" class="btn-primary submit-btn" [disabled]="loading">
        {{ loading ? 'Signing in…' : 'Sign In' }}
      </button>
    </form>

    <p class="switch-link">Don't have an account? <a routerLink="/register">Register here</a></p>
  </div>
</div>
