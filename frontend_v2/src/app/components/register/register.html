<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">🛰 PLASTICPATROL</div>
    <h2>Create account</h2>
    <p class="subtitle">Join the fight against ocean plastic</p>

    <form (ngSubmit)="submit()" #f="ngForm">
      <div class="field">
        <label class="label">Username</label>
        <input type="text" [(ngModel)]="username" name="username" placeholder="oceanwarrior42" required>
      </div>
      <div class="field">
        <label class="label">Email</label>
        <input type="email" [(ngModel)]="email" name="email" placeholder="you@example.com" required>
      </div>
      <div class="field">
        <label class="label">Password</label>
        <input type="password" [(ngModel)]="password" name="password" placeholder="••••••••" required minlength="6">
      </div>

      @if (error) { <p class="error-msg">{{ error }}</p> }

      <button type="submit" class="btn-primary submit-btn" [disabled]="loading">
        {{ loading ? 'Creating account…' : 'Register' }}
      </button>
    </form>

    <p class="switch-link">Already have an account? <a routerLink="/login">Sign in</a></p>
  </div>
</div>
