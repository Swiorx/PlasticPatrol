<div class="map-page">
  <div class="map-bar">
    <span class="map-title">🗺️ Debris Map</span>
    @if (loading) { <span class="status">Loading debris data…</span> }
    @else if (error) { <span class="status error">{{ error }}</span> }
    @else { <span class="status">{{ debrisCount }} debris points loaded</span> }
  </div>

  <div id="pp-map"></div>

  <div class="legend">
    <div class="legend-title">LEGEND</div>
    <div class="legend-item"><span class="dot" style="background:#ef4444"></span> Large</div>
    <div class="legend-item"><span class="dot" style="background:#f97316"></span> Medium</div>
    <div class="legend-item"><span class="dot" style="background:#eab308"></span> Small</div>
    <div class="legend-item"><span class="dot" style="background:#a855f7"></span> Beach</div>
  </div>
</div>
