<header class="header">
  <a class="logo" routerLink="/">🛰 PLASTICPATROL</a>

  <nav class="nav">
    <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}">Home</a>
    <a routerLink="/map" routerLinkActive="active">Map</a>
    <a routerLink="/classify" routerLinkActive="active">Classify</a>
  </nav>

  <div class="auth-actions">
    @if (auth.isLoggedIn()) {
      <button class="btn-ghost" (click)="logout()">Logout</button>
    } @else {
      <a routerLink="/login" class="btn-ghost">Sign in</a>
      <a routerLink="/register" class="btn-primary">Register</a>
    }
  </div>
</header>
